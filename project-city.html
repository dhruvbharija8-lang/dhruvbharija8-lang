<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Dhruv's Project City</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{height:100%;font-family:'Segoe UI',Verdana,sans-serif;background:#05070d;overflow:hidden}
  .scene{position:relative;width:100%;height:100vh;min-height:560px;overflow:hidden;cursor:default;
    background:radial-gradient(120% 90% at 50% 8%,#182a4a 0%,#0d1830 42%,#070b16 100%)}
  .stars{position:absolute;inset:0}
  .star{position:absolute;width:2px;height:2px;border-radius:50%;background:#dfeeff;animation:tw 3s infinite}
  @keyframes tw{0%,100%{opacity:.25}50%{opacity:1}}
  .moon{position:absolute;top:46px;right:9%;width:74px;height:74px;border-radius:50%;
    background:radial-gradient(circle at 40% 38%,#fdf6e3,#e9d9ad);box-shadow:0 0 60px 18px rgba(253,246,227,.28)}
  .cloud{position:absolute;height:26px;border-radius:20px;background:rgba(120,150,200,.10);filter:blur(6px);animation:drift 40s linear infinite}
  @keyframes drift{from{transform:translateX(-260px)}to{transform:translateX(120vw)}}

  .stage{position:absolute;inset:0;transform-origin:0 0;transition:transform 1.1s cubic-bezier(.6,.02,.2,1)}
  .skyline{position:absolute;left:0;right:0;bottom:0;height:78%;display:flex;align-items:flex-end;
    justify-content:center;gap:6px;padding:0 3%}
  .haze{position:absolute;left:0;right:0;bottom:0;height:120px;pointer-events:none;
    background:linear-gradient(to top,rgba(46,158,247,.16),transparent)}

  .tower{position:relative;flex:0 0 auto;border-radius:6px 6px 0 0;background:linear-gradient(180deg,#101a2e,#0a1120);
    box-shadow:inset 0 0 0 1px rgba(120,160,220,.10)}
  .filler{opacity:.72;filter:saturate(.7) brightness(.82)}
  .windows{position:absolute;inset:10px 8px 0 8px;display:grid;gap:4px}
  .win{border-radius:1px;background:#1b2946}
  .win.on{background:#ffd98a;box-shadow:0 0 5px rgba(255,217,138,.7)}
  .win.blue{background:#7fc9ff;box-shadow:0 0 5px rgba(127,201,255,.7)}

  .project{cursor:pointer;transition:transform .35s,box-shadow .35s;
    box-shadow:inset 0 0 0 1px color-mix(in srgb,var(--c) 40%,transparent),0 0 0 rgba(0,0,0,0)}
  .project:hover{transform:translateY(-6px);box-shadow:inset 0 0 0 1px var(--c),0 14px 40px color-mix(in srgb,var(--c) 45%,transparent)}
  .sign{position:absolute;top:-30px;left:50%;transform:translateX(-50%);white-space:nowrap;
    font-size:13px;font-weight:700;color:var(--c);padding:4px 10px;border:1px solid var(--c);border-radius:8px;
    background:rgba(8,12,20,.85);text-shadow:0 0 8px var(--c);animation:flicker 5s infinite}
  @keyframes flicker{0%,100%{opacity:1}92%{opacity:1}93%{opacity:.4}94%{opacity:1}96%{opacity:.6}97%{opacity:1}}
  .antenna{position:absolute;top:-46px;left:50%;width:2px;height:18px;background:var(--c);transform:translateX(-50%)}
  .antenna::after{content:"";position:absolute;top:-4px;left:-2px;width:6px;height:6px;border-radius:50%;
    background:var(--c);box-shadow:0 0 8px var(--c);animation:tw 1.4s infinite}

  .doorway{position:absolute;bottom:0;left:50%;transform:translateX(-50%);width:64%;height:44%;
    background:radial-gradient(120% 90% at 50% 40%,color-mix(in srgb,var(--c) 30%,#0a0f1a),#070b13);
    border-radius:6px 6px 0 0;overflow:hidden;box-shadow:inset 0 0 0 1px color-mix(in srgb,var(--c) 45%,transparent)}
  .door{position:absolute;top:0;bottom:0;width:50%;background:linear-gradient(180deg,#12203a,#0a1322);
    box-shadow:inset 0 0 0 1px rgba(120,160,220,.14);transition:transform 1s ease .15s;z-index:3}
  .doorL{left:0;border-right:1px solid rgba(0,0,0,.4)}
  .doorR{right:0}
  .door::before{content:"";position:absolute;top:44%;width:6px;height:14px;border-radius:3px;background:var(--c);opacity:.8}
  .doorL::before{right:5px}.doorR::before{left:5px}
  .entered .doorL{transform:translateX(-102%)}
  .entered .doorR{transform:translateX(102%)}

  .room{position:absolute;inset:0;padding:7px 8px;display:flex;flex-direction:column;gap:4px;
    opacity:0;transition:opacity .5s ease .7s;color:#eaf3ff;z-index:2;
    background:radial-gradient(90% 70% at 50% 30%,color-mix(in srgb,var(--c) 22%,#0b1120),#080d16)}
  .entered .room{opacity:1}
  .room h3{font-size:9px;font-weight:700;color:var(--c);line-height:1.1}
  .room .tag{font-size:5.5px;color:#9fb6d0;line-height:1.2}
  .room .badges{display:flex;flex-wrap:wrap;gap:2px;margin-top:1px}
  .room .b{font-size:5px;font-weight:700;color:var(--c);border:.5px solid var(--c);border-radius:6px;padding:1px 3px}
  .room .links{margin-top:auto;display:flex;gap:3px}
  .room a{font-size:5.5px;font-weight:700;text-decoration:none;padding:2px 5px;border-radius:5px;color:#06101a;background:var(--c)}
  .room a.ghost{color:var(--c);background:transparent;border:.5px solid var(--c)}

  .ui{position:absolute;top:16px;left:18px;z-index:20;color:#cfe0f5}
  .ui .t{font-size:20px;font-weight:700;color:#eaf3ff}
  .ui .s{font-size:12px;color:#7fa8c9;margin-top:2px}
  .hint{position:absolute;bottom:16px;left:50%;transform:translateX(-50%);z-index:20;
    font-size:12px;color:#8fb0cf;background:rgba(8,12,20,.6);padding:6px 14px;border-radius:20px;
    border:1px solid rgba(120,160,220,.2);animation:tw 2.6s infinite}
  .back{position:absolute;top:16px;right:18px;z-index:30;display:none;cursor:pointer;
    font-size:13px;font-weight:700;color:#eaf3ff;background:rgba(8,12,20,.75);
    padding:8px 14px;border-radius:20px;border:1px solid rgba(120,160,220,.35)}
  .zoomed .back{display:block}
  .zoomed .hint{display:none}
  .zoomed .project:not(.active){opacity:.25;filter:blur(1px)}
</style>
</head>
<body>
<div class="scene" id="scene">
  <div class="stars" id="stars"></div>
  <div class="moon"></div>
  <div class="cloud" style="top:120px;width:180px;animation-delay:-6s"></div>
  <div class="cloud" style="top:200px;width:120px;animation-delay:-24s;opacity:.7"></div>

  <div class="stage" id="stage">
    <div class="skyline" id="skyline"></div>
  </div>
  <div class="haze"></div>

  <div class="ui"><div class="t">Project City</div><div class="s">click a glowing tower to zoom in and open its doors</div></div>
  <div class="hint">Tap a neon tower ↑</div>
  <div class="back" id="back">← Back to city</div>
</div>

<script>
const projects=[
  {name:"MBA Partner",c:"#FFD700",tag:"Tech Launchpad 1.0 — 1st nationally",
   badges:["#1 National","2,000+ users","AI chatbot"],code:"https://github.com/dhruvbharija8-lang/mba",live:"https://mbapartner.in"},
  {name:"MindCraft",c:"#47D66A",tag:"MERN EdTech platform",
   badges:["5,000+ txns/mo","JWT RBAC","35% faster"],code:"https://github.com/dhruvbharija8-lang/Mindcraft",live:""},
  {name:"Heure Haute",c:"#2E9EF7",tag:"Full-stack e-commerce",
   badges:["40% faster API","Secure checkout","MongoDB"],code:"https://github.com/dhruvbharija8-lang/Heure-Haute-1",live:""},
  {name:"Portfolio",c:"#7C5CFF",tag:"Responsive personal site",
   badges:["95+ Lighthouse","Framer Motion","Responsive"],code:"https://github.com/dhruvbharija8-lang/portfolio",live:"https://dhruvbharija8-lang-portfolio-ktfo.vercel.app/"}
];

const stars=document.getElementById('stars');
for(let i=0;i<70;i++){const s=document.createElement('div');s.className='star';
  s.style.left=Math.random()*100+'%';s.style.top=Math.random()*55+'%';
  s.style.animationDelay=(-Math.random()*3)+'s';s.style.opacity=.3+Math.random()*.7;stars.appendChild(s);}

function makeWindows(el,cols,rows,accent){
  const w=document.createElement('div');w.className='windows';
  w.style.gridTemplateColumns=`repeat(${cols},1fr)`;w.style.gridTemplateRows=`repeat(${rows},1fr)`;
  for(let i=0;i<cols*rows;i++){const c=document.createElement('div');c.className='win';
    const r=Math.random();if(r>.62)c.classList.add('on');else if(r>.5){c.classList.add('blue');}
    if(Math.random()>.9)c.style.animation='tw '+(2+Math.random()*3)+'s infinite';
    w.appendChild(c);}
  el.appendChild(w);
}

const skyline=document.getElementById('skyline');
const layout=[
  {f:1,h:240,w:52},{f:1,h:300,w:60},
  {p:0,h:410,w:150},
  {f:1,h:270,w:56},{f:1,h:330,w:64},
  {p:1,h:360,w:150},
  {f:1,h:250,w:52},
  {p:2,h:430,w:150},
  {f:1,h:290,w:58},{f:1,h:320,w:60},
  {p:3,h:380,w:150},
  {f:1,h:260,w:54},{f:1,h:300,w:58}
];
layout.forEach(b=>{
  const t=document.createElement('div');t.className='tower';
  t.style.height=b.h+'px';t.style.width=b.w+'px';
  if(b.f){t.classList.add('filler');makeWindows(t,Math.max(3,Math.round(b.w/16)),Math.round(b.h/22));}
  else{
    const pj=projects[b.p];t.classList.add('project');t.style.setProperty('--c',pj.c);t.dataset.i=b.p;
    t.innerHTML=`<div class="antenna"></div><div class="sign">${pj.name}</div>`;
    makeWindows(t,6,Math.round((b.h*0.55)/22));
    const dw=document.createElement('div');dw.className='doorway';
    dw.innerHTML=`
      <div class="room">
        <h3>${pj.name}</h3><div class="tag">${pj.tag}</div>
        <div class="badges">${pj.badges.map(x=>`<span class="b">${x}</span>`).join('')}</div>
        <div class="links">
          <a href="${pj.code}" target="_blank" rel="noopener">Code</a>
          ${pj.live?`<a class="ghost" href="${pj.live}" target="_blank" rel="noopener">Live</a>`:''}
        </div>
      </div>
      <div class="door doorL"></div><div class="door doorR"></div>`;
    t.appendChild(dw);
    t.addEventListener('click',e=>{e.stopPropagation();enter(t);});
  }
  skyline.appendChild(t);
});

const scene=document.getElementById('scene'),stage=document.getElementById('stage'),back=document.getElementById('back');
let active=null;
function enter(t){
  if(active)return;active=t;t.classList.add('active');
  const sr=scene.getBoundingClientRect(),br=t.getBoundingClientRect();
  const bx=br.left-sr.left+br.width/2, by=br.top-sr.top+br.height*0.72;
  const S=Math.min(3.0,(sr.height*0.82)/br.height);
  stage.style.transform=`translate(${sr.width/2-bx*S}px, ${sr.height/2-by*S}px) scale(${S})`;
  scene.classList.add('zoomed');
  setTimeout(()=>t.classList.add('entered'),650);
}
function exit(){
  if(!active)return;active.classList.remove('entered');
  const cur=active;setTimeout(()=>cur.classList.remove('active'),300);
  active=null;stage.style.transform='';scene.classList.remove('zoomed');
}
back.addEventListener('click',exit);
scene.addEventListener('click',e=>{if(active&&!e.target.closest('.project'))exit();});
</script>
</body>
</html>
