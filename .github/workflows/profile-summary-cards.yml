name: generate profile summary cards

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: generate profile summary cards
        uses: vn7n24fzkq/github-profile-summary-cards@release
        with:
          username: dhruvbharija8-lang
          theme: tokyonight
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
