<svg xmlns="http://www.w3.org/2000/svg" width="100%" viewBox="0 0 1000 500" role="img" fill="none">
  <title>Dhruv's Project Universe</title>
  <desc>An animated solar system: Dhruv is the star, four projects orbit as glowing planets.</desc>

  <defs>
    <radialGradient id="space" cx="50%" cy="48%" r="75%">
      <stop offset="0" stop-color="#132535"/>
      <stop offset="0.55" stop-color="#0b1622"/>
      <stop offset="1" stop-color="#06101a"/>
    </radialGradient>
    <radialGradient id="sunGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0" stop-color="#7fd4ff" stop-opacity="0.55"/>
      <stop offset="0.5" stop-color="#2E9EF7" stop-opacity="0.25"/>
      <stop offset="1" stop-color="#2E9EF7" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="sunBody" cx="42%" cy="38%" r="65%">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="0.4" stop-color="#bfe8ff"/>
      <stop offset="0.75" stop-color="#2E9EF7"/>
      <stop offset="1" stop-color="#124a76"/>
    </radialGradient>
    <radialGradient id="pGold" cx="35%" cy="30%" r="75%">
      <stop offset="0" stop-color="#fff4c8"/><stop offset="0.55" stop-color="#FFD700"/><stop offset="1" stop-color="#8a6d00"/>
    </radialGradient>
    <radialGradient id="pGreen" cx="35%" cy="30%" r="75%">
      <stop offset="0" stop-color="#d6ffe1"/><stop offset="0.55" stop-color="#47D66A"/><stop offset="1" stop-color="#166b30"/>
    </radialGradient>
    <radialGradient id="pBlue" cx="35%" cy="30%" r="75%">
      <stop offset="0" stop-color="#d6ecff"/><stop offset="0.55" stop-color="#2E9EF7"/><stop offset="1" stop-color="#0d4f82"/>
    </radialGradient>
    <radialGradient id="pPurple" cx="35%" cy="30%" r="75%">
      <stop offset="0" stop-color="#ebe2ff"/><stop offset="0.55" stop-color="#7C5CFF"/><stop offset="1" stop-color="#35228f"/>
    </radialGradient>
    <radialGradient id="neb1" cx="50%" cy="50%" r="50%">
      <stop offset="0" stop-color="#2E9EF7" stop-opacity="0.16"/><stop offset="1" stop-color="#2E9EF7" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="neb2" cx="50%" cy="50%" r="50%">
      <stop offset="0" stop-color="#7C5CFF" stop-opacity="0.16"/><stop offset="1" stop-color="#7C5CFF" stop-opacity="0"/>
    </radialGradient>
    <style>
      .nm{font-family:'Segoe UI',Verdana,sans-serif;font-weight:700;fill:#ffffff}
      .mt{font-family:'Segoe UI',Verdana,sans-serif;font-weight:700}
      .ti{font-family:'Segoe UI',Verdana,sans-serif;font-weight:700;fill:#eaf3ff}
      .sb{font-family:'Segoe UI',Verdana,sans-serif;fill:#7fa8c9}
      .core{font-family:'Segoe UI',Verdana,sans-serif;font-weight:700;fill:#06202f}
    </style>
  </defs>

  <rect x="0" y="0" width="1000" height="500" rx="18" fill="url(#space)"/>
  <ellipse cx="230" cy="150" rx="220" ry="150" fill="url(#neb2)"/>
  <ellipse cx="800" cy="360" rx="240" ry="170" fill="url(#neb1)"/>

  <g fill="#e6f2ff">
    <circle cx="90" cy="70" r="1.4" opacity="0.9"><animate attributeName="opacity" values="0.3;1;0.3" dur="3s" repeatCount="indefinite"/></circle>
    <circle cx="250" cy="46" r="1" opacity="0.6"><animate attributeName="opacity" values="0.2;0.9;0.2" dur="4s" repeatCount="indefinite"/></circle>
    <circle cx="430" cy="70" r="1.3" opacity="0.8"><animate attributeName="opacity" values="0.3;1;0.3" dur="2.6s" repeatCount="indefinite"/></circle>
    <circle cx="700" cy="50" r="1" opacity="0.6"><animate attributeName="opacity" values="0.2;0.8;0.2" dur="3.4s" repeatCount="indefinite"/></circle>
    <circle cx="930" cy="90" r="1.3" opacity="0.8"><animate attributeName="opacity" values="0.3;1;0.3" dur="3.8s" repeatCount="indefinite"/></circle>
    <circle cx="150" cy="430" r="1.2" opacity="0.7"><animate attributeName="opacity" values="0.2;0.9;0.2" dur="3.1s" repeatCount="indefinite"/></circle>
    <circle cx="560" cy="450" r="1" opacity="0.6"><animate attributeName="opacity" values="0.2;0.8;0.2" dur="2.8s" repeatCount="indefinite"/></circle>
    <circle cx="860" cy="440" r="1.2" opacity="0.7"><animate attributeName="opacity" values="0.3;1;0.3" dur="3.5s" repeatCount="indefinite"/></circle>
    <circle cx="40" cy="250" r="1" opacity="0.6"><animate attributeName="opacity" values="0.2;0.8;0.2" dur="4.2s" repeatCount="indefinite"/></circle>
    <circle cx="975" cy="250" r="1" opacity="0.6"><animate attributeName="opacity" values="0.2;0.9;0.2" dur="3.6s" repeatCount="indefinite"/></circle>
  </g>

  <line x1="120" y1="60" x2="230" y2="120" stroke="#bfe4ff" stroke-width="2" stroke-linecap="round" opacity="0">
    <animate attributeName="opacity" values="0;0;0.9;0" keyTimes="0;0.7;0.8;1" dur="7s" repeatCount="indefinite"/>
  </line>

  <text x="42" y="44" class="ti" font-size="20">Project Universe</text>
  <text x="42" y="65" class="sb" font-size="12">four worlds I've built — repos are in the cards below</text>

  <ellipse cx="500" cy="250" rx="160" ry="78" stroke="#ffffff" stroke-width="0.8" opacity="0.10"/>
  <ellipse cx="500" cy="250" rx="255" ry="112" stroke="#ffffff" stroke-width="0.8" opacity="0.10"/>
  <ellipse cx="500" cy="250" rx="340" ry="146" stroke="#ffffff" stroke-width="0.8" opacity="0.09"/>
  <ellipse cx="500" cy="250" rx="410" ry="178" stroke="#ffffff" stroke-width="0.8" opacity="0.08"/>

  <circle cx="500" cy="250" r="92" fill="url(#sunGlow)"><animate attributeName="r" values="86;100;86" dur="5s" repeatCount="indefinite"/></circle>
  <circle cx="500" cy="250" r="58" stroke="#7fd4ff" stroke-width="1" stroke-dasharray="3 9" opacity="0.7">
    <animateTransform attributeName="transform" type="rotate" values="0 500 250;360 500 250" dur="26s" repeatCount="indefinite"/>
  </circle>
  <circle cx="500" cy="250" r="46" fill="url(#sunBody)"/>
  <ellipse cx="486" cy="234" rx="14" ry="9" fill="#ffffff" opacity="0.55"/>
  <text x="500" y="248" text-anchor="middle" class="core" font-size="17">Dhruv</text>
  <text x="500" y="264" text-anchor="middle" class="core" font-size="9" opacity="0.8">FRONTEND ENGINEER</text>

  <g>
    <animateMotion dur="22s" repeatCount="indefinite" path="M340,250 a160,78 0 1,1 320,0 a160,78 0 1,1 -320,0"/>
    <circle cx="0" cy="0" r="26" fill="#FFD700" opacity="0.16"/>
    <circle cx="0" cy="0" r="18" fill="url(#pGold)"/>
    <ellipse cx="-6" cy="-6" rx="5" ry="3" fill="#ffffff" opacity="0.6"/>
    <rect x="-66" y="26" width="132" height="34" rx="10" fill="#0d1117" opacity="0.9" stroke="#FFD700" stroke-width="1.3"/>
    <text x="0" y="41" text-anchor="middle" class="nm" font-size="13">MBA Partner</text>
    <text x="0" y="54" text-anchor="middle" class="mt" font-size="10" fill="#FFD700">#1 National · 2,000+ users</text>
  </g>

  <g>
    <animateMotion dur="30s" begin="-8s" repeatCount="indefinite" path="M245,250 a255,112 0 1,1 510,0 a255,112 0 1,1 -510,0"/>
    <circle cx="0" cy="0" r="28" fill="#47D66A" opacity="0.16"/>
    <circle cx="0" cy="0" r="20" fill="url(#pGreen)"/>
    <ellipse cx="-7" cy="-7" rx="6" ry="3.5" fill="#ffffff" opacity="0.6"/>
    <rect x="-70" y="28" width="140" height="34" rx="10" fill="#0d1117" opacity="0.9" stroke="#47D66A" stroke-width="1.3"/>
    <text x="0" y="43" text-anchor="middle" class="nm" font-size="13">MindCraft</text>
    <text x="0" y="56" text-anchor="middle" class="mt" font-size="10" fill="#47D66A">5,000+ txns/mo · 35% faster</text>
  </g>

  <g>
    <animateMotion dur="40s" begin="-16s" repeatCount="indefinite" path="M160,250 a340,146 0 1,1 680,0 a340,146 0 1,1 -680,0"/>
    <circle cx="0" cy="0" r="27" fill="#2E9EF7" opacity="0.16"/>
    <circle cx="0" cy="0" r="19" fill="url(#pBlue)"/>
    <ellipse cx="-6" cy="-6" rx="5" ry="3" fill="#ffffff" opacity="0.6"/>
    <rect x="-66" y="27" width="132" height="34" rx="10" fill="#0d1117" opacity="0.9" stroke="#2E9EF7" stroke-width="1.3"/>
    <text x="0" y="42" text-anchor="middle" class="nm" font-size="13">Heure Haute</text>
    <text x="0" y="55" text-anchor="middle" class="mt" font-size="10" fill="#2E9EF7">40% faster API · secure</text>
  </g>

  <g>
    <animateMotion dur="52s" begin="-30s" repeatCount="indefinite" path="M90,250 a410,178 0 1,1 820,0 a410,178 0 1,1 -820,0"/>
    <ellipse cx="0" cy="0" rx="40" ry="14" stroke="#7C5CFF" stroke-width="2" opacity="0.55"/>
    <circle cx="0" cy="0" r="30" fill="#7C5CFF" opacity="0.15"/>
    <circle cx="0" cy="0" r="22" fill="url(#pPurple)"/>
    <ellipse cx="-8" cy="-8" rx="6" ry="4" fill="#ffffff" opacity="0.6"/>
    <rect x="-66" y="30" width="132" height="34" rx="10" fill="#0d1117" opacity="0.9" stroke="#7C5CFF" stroke-width="1.3"/>
    <text x="0" y="45" text-anchor="middle" class="nm" font-size="13">Portfolio</text>
    <text x="0" y="58" text-anchor="middle" class="mt" font-size="10" fill="#7C5CFF">95+ Lighthouse · responsive</text>
  </g>
</svg>
